# Nome do app, usado para identificar containers.
service: synaxis_koinonia

# Nome da imagem (use user/app em registries externos).
image: synaxis_koinonia

# Servidores de deploy. Web roda Puma, job roda Sidekiq.
servers:
  web:
    - 192.168.0.1
  job:
    hosts:
      - 192.168.0.1
    cmd: bundle exec sidekiq -C config/sidekiq.yml

# Proxy/SSL — habilitar quando o domínio estiver definido.
# proxy:
#   ssl: true
#   host: app.example.com

# Registry de imagens.
registry:
  server: localhost:5555
  # username: your-user
  # password:
  #   - KAMAL_REGISTRY_PASSWORD

# ENV injetadas nos containers. Secrets ficam em .kamal/secrets.
env:
  secret:
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - DEFAULT_DATABASE_HOST
    - DEFAULT_DATABASE_NAME
    - DEFAULT_DATABASE_USERNAME
    - DEFAULT_DATABASE_PASSWORD
    - REDIS_URL
    - SMTP_ADDRESS
    - SMTP_PORT
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - SMTP_DOMAIN
    - MAILER_FROM
    - RECAPTCHA_SITE_KEY
    - RECAPTCHA_SECRET_KEY
    - INSTAGRAM_ACCESS_TOKEN
    - INSTAGRAM_BUSINESS_ACCOUNT_ID
    - FACEBOOK_PAGE_ID
    - FACEBOOK_PAGE_ACCESS_TOKEN
    - X_API_KEY
    - X_API_SECRET
    - X_BEARER_TOKEN
    - X_ACCESS_TOKEN
    - X_ACCESS_SECRET
  clear:
    APP_HOST: https://synaxis.local
    DISABLE_SOCIAL_PUBLISHING: "false"
    RAILS_MAX_THREADS: 5
    # WEB_CONCURRENCY: 2
    # RAILS_LOG_LEVEL: debug

# Aliases para "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Volumes persistentes.
# - storage: arquivos de Active Storage (não usado para banner, mas mantido para segurança).
# - uploads: banners gravados em /rails/public/uploads — precisa persistir entre deploys.
volumes:
  - "synaxis_koinonia_storage:/rails/storage"
  - "synaxis_koinonia_uploads:/rails/public/uploads"

# Bridge entre assets versionados.
asset_path: /rails/public/assets

# Configuração do builder.
builder:
  arch: amd64

# Acessórios: PostgreSQL e Redis rodando como containers no mesmo host.
accessories:
  postgres:
    image: postgres:16
    host: 192.168.0.1
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: synaxis
        POSTGRES_DB: synaxis_koinonia_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    host: 192.168.0.1
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
